# DeepBook Sandbox - Docker Compose
#
# Usage:
#   Testnet/Mainnet (full stack with indexer):
#     docker compose --profile remote up -d     # Start postgres + indexer + server
#     docker compose --profile remote down      # Stop services
#     docker compose --profile remote down -v   # Stop and remove volumes
#
#   Localnet (full local stack with indexer):
#     docker compose --profile localnet up -d   # Start postgres + sui-localnet + indexer
#     docker compose --profile localnet down    # Stop services
#
#   Stop all services (any profile):
#     docker compose --profile remote --profile localnet down
#
#   View logs:
#     docker compose logs -f
#
# Architecture note (localnet only):
#   Set SUI_TOOLS_IMAGE in .env based on your CPU:
#   - ARM64 (Apple Silicon): SUI_TOOLS_IMAGE=mysten/sui-tools:mainnet-v1.63.3-arm64
#   - x86_64 (Intel/AMD):    SUI_TOOLS_IMAGE=mysten/sui-tools:mainnet-v1.63.3

networks:
  deepbook-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  sui_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  checkpoint_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: deepbook-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deepbook-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deepbook"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # Sui Localnet
  # Start with: docker compose --profile localnet up -d
  # Dumps checkpoints to shared volume for the indexer
  # ============================================================
  sui-localnet:
    image: ${SUI_TOOLS_IMAGE:?Set SUI_TOOLS_IMAGE in .env to full image name, e.g. mysten/sui-tools:mainnet-v1.63.3-arm64 (ARM) or mysten/sui-tools:mainnet-v1.63.3 (x86)}
    container_name: sui-localnet
    profiles:
      - localnet
    environment:
      FORCE_REGENESIS: ${FORCE_REGENESIS:-true}
    command: >
      sh -c '
        sui client new-address ed25519 2>/dev/null;
        cp /root/.sui/sui_config/sui.keystore /shared/.sui-keystore;
        chmod 644 /shared/.sui-keystore;
        export RUST_LOG="off,sui_node=info";
        exec sui start --data-ingestion-dir /checkpoints --with-faucet ${FORCE_REGENESIS:+--force-regenesis}
      '
    ports:
      - "9000:9000" # RPC
      - "9123:9123" # Faucet
    volumes:
      - sui_data:/root/.sui
      - checkpoint_data:/checkpoints
      - ./deployments:/shared
    networks:
      - deepbook-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # Market Maker
  # Automated market maker for localnet DEEP/SUI pool
  # Started by deploy-all after pool creation (env vars set via .env)
  # ============================================================
  market-maker:
    profiles:
      - localnet
    build:
      context: .
      dockerfile: ./scripts/market-maker/Dockerfile
    image: mysten/deepbook-sandbox-market-maker:latest
    container_name: deepbook-market-maker
    environment:
      NETWORK: localnet
      RPC_URL: http://sui-localnet:9000
      PRIVATE_KEY: ${PRIVATE_KEY:?Set PRIVATE_KEY in .env}
      VERBOSE: "1"
      DEEPBOOK_PACKAGE_ID: ${DEEPBOOK_PACKAGE_ID}
      POOL_ID: ${POOL_ID}
      BASE_COIN_TYPE: ${BASE_COIN_TYPE}
      DEPLOYER_ADDRESS: ${DEPLOYER_ADDRESS}
      PYTH_PACKAGE_ID: ${PYTH_PACKAGE_ID}
      DEEP_PRICE_INFO_OBJECT_ID: ${DEEP_PRICE_INFO_OBJECT_ID}
      SUI_PRICE_INFO_OBJECT_ID: ${SUI_PRICE_INFO_OBJECT_ID}
      MM_SPREAD_BPS: ${MM_SPREAD_BPS:-10}
      MM_LEVELS_PER_SIDE: ${MM_LEVELS_PER_SIDE:-5}
      MM_ORDER_SIZE_BASE: ${MM_ORDER_SIZE_BASE:-}
      MM_REBALANCE_INTERVAL_MS: ${MM_REBALANCE_INTERVAL_MS:-10000}
      MM_HEALTH_CHECK_PORT: ${MM_HEALTH_CHECK_PORT:-3000}
      MM_METRICS_PORT: ${MM_METRICS_PORT:-9090}
    ports:
      - "3001:3000" # Health check (offset to avoid host conflict)
      - "9091:9090" # Prometheus metrics (offset)
    networks:
      - deepbook-net
    depends_on:
      sui-localnet:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # DeepBook Indexer
  # Indexes DeepBook events from Sui chain checkpoints
  # Localnet: reads from shared checkpoint_data volume
  # Remote: reads from network checkpoint URLs
  # ============================================================
  deepbook-indexer:
    profiles:
      - remote
      - localnet
    image: sandbox-deepbook-indexer
    build:
      context: ../external/deepbook
      dockerfile: docker/deepbook-sandbox/Dockerfile
      args:
        PROFILE: release
        GIT_REVISION: ${GIT_REVISION:-local}
    container_name: deepbook-indexer
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deepbook
      NETWORK: ${NETWORK:-localnet}
      RUST_LOG: ${RUST_LOG:-info}
      FIRST_CHECKPOINT: ${FIRST_CHECKPOINT:-}
      LOCAL_CHECKPOINTS_DIR: ${LOCAL_CHECKPOINTS_DIR:-/checkpoints}
      MARGIN_PACKAGES: ${MARGIN_PACKAGES:-}
      DEEPBOOK_PACKAGE_ID: ${DEEPBOOK_PACKAGE_ID:-}
    ports:
      - "9184:9184" # Prometheus metrics
    volumes:
      - checkpoint_data:/checkpoints
    networks:
      - deepbook-net
    depends_on:
      postgres:
        condition: service_healthy
      sui-localnet:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9184/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ============================================================
  # DeepBook Server (REST API)
  # Provides HTTP API for querying indexed DeepBook data
  # Requires indexer to populate database
  # ============================================================
  deepbook-server:
    profiles:
      - remote
      - localnet
    image: sandbox-deepbook-server
    build:
      context: ../external/deepbook
      dockerfile: docker/deepbook-server/Dockerfile
      args:
        PROFILE: release
        GIT_REVISION: ${GIT_REVISION:-local}
    container_name: deepbook-server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deepbook
      RPC_URL: http://host.docker.internal:9000 # Overwrite this for testnet
      DEEPBOOK_PACKAGE_ID: ${DEEPBOOK_PACKAGE_ID:-}
      DEEP_TOKEN_PACKAGE_ID: ${DEEP_TOKEN_PACKAGE_ID:-}
      DEEP_TREASURY_ID: ${DEEP_TREASURY_ID:-}
      MARGIN_PACKAGE_ID: ${MARGIN_PACKAGE_ID:-}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "9008:9008" # REST API
      - "9185:9184" # Prometheus metrics (offset to avoid conflict with indexer)
    networks:
      - deepbook-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9008/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # DeepBook Faucet
  # Distributes SUI (proxied) and DEEP tokens for testing
  # ============================================================
  deepbook-faucet:
    profiles:
      - localnet
      - remote
    build:
      context: ./faucet
    image: mysten/deepbook-sandbox-faucet:latest
    container_name: deepbook-faucet
    environment:
      NETWORK: ${NETWORK:-localnet}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      DEEP_TOKEN_PACKAGE_ID: ${DEEP_TOKEN_PACKAGE_ID:-}
      RPC_URL: ${RPC_URL:-}
      PORT: 9009
      MAX_DEEP_PER_REQUEST: 10000
    ports:
      - "9009:9009"
    networks:
      - deepbook-net
    depends_on:
      sui-localnet:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9009/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # Oracle Service
  # Updates Pyth price feeds for SUI and DEEP on localnet
  # ============================================================
  oracle-service:
    profiles:
      - localnet
    build:
      context: .
      dockerfile: ./scripts/oracle-service/Dockerfile
    image: mysten/deepbook-sandbox-oracle-service:latest
    container_name: oracle-service
    environment:
      NETWORK: localnet
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY:-}
      RPC_URL: http://sui-localnet:9000
      PYTH_PACKAGE_ID: ${PYTH_PACKAGE_ID:-}
      DEEP_PRICE_INFO_OBJECT_ID: ${DEEP_PRICE_INFO_OBJECT_ID:-}
      SUI_PRICE_INFO_OBJECT_ID: ${SUI_PRICE_INFO_OBJECT_ID:-}
      USDC_PRICE_INFO_OBJECT_ID: ${USDC_PRICE_INFO_OBJECT_ID:-}
    ports:
      - "9010:9010"
    networks:
      - deepbook-net
    depends_on:
      sui-localnet:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9010/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
