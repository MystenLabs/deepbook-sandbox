server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so nginx can start even when
    # upstream containers don't exist yet (resolves at request time).
    resolver 127.0.0.11 valid=10s;

    # DeepBook REST API server
    location /api/deepbook/ {
        set $upstream_deepbook http://deepbook-server:9008;
        rewrite ^/api/deepbook/(.*) /$1 break;
        proxy_pass $upstream_deepbook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Oracle service status
    location /api/oracle/ {
        set $upstream_oracle http://oracle-service:9010;
        rewrite ^/api/oracle/(.*) /$1 break;
        proxy_pass $upstream_oracle;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Market maker health/status
    location /api/mm/ {
        set $upstream_mm http://deepbook-market-maker:3000;
        rewrite ^/api/mm/(.*) /$1 break;
        proxy_pass $upstream_mm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sui RPC
    location /api/sui/ {
        set $upstream_sui http://sui-localnet:9000;
        rewrite ^/api/sui/(.*) /$1 break;
        proxy_pass $upstream_sui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Unified API (faucet + trading) — catch-all after specific proxies
    location /api/ {
        set $upstream_api http://deepbook-sandbox-api:9009;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
