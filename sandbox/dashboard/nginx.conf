server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DeepBook REST API server
    location /api/deepbook/ {
        proxy_pass http://deepbook-server:9008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Oracle service status
    location /api/oracle/ {
        proxy_pass http://oracle-service:9010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Market maker health/status
    location /api/mm/ {
        proxy_pass http://deepbook-market-maker:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Faucet
    location /api/faucet/ {
        proxy_pass http://deepbook-faucet:9009/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sui RPC
    location /api/sui/ {
        proxy_pass http://sui-localnet:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
